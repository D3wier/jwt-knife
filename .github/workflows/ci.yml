name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w" -o jwt-knife-${GOOS}-${GOARCH}${ext} ./cmd/jwt-knife/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jwt-knife-${{ matrix.goos }}-${{ matrix.goarch }}
          path: jwt-knife-*
